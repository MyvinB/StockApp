services:
  - type: web
    name: stock-dashboard
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt && python -m nltk.downloader vader_lexicon
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROWW_API_KEY
        sync: false
      - key: GROWW_API_SECRET
        sync: false
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
      - key: TWILIO_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: NOTIFY_PHONE
        sync: false
